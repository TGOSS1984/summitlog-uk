  <circle cx="50" cy="50" r="48" fill="#04393b"/>
  <!-- Gold border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#d0aa62" stroke-width="3"/>
  <!-- Gold peak polyline — scaled from 44x44 viewBox to 100x100, with inset -->
